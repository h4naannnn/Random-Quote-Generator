<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random quote generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body class="body">
    <div class="container">
        <header class="title">Inspirational Quotes</header>
            <p class="quote">"Innovation distinguishes between a leader and a follower"</p>
            <p class="author">- Steve Jobs</p>
            <button  class="nwquote" id="btn"><i class="fa-solid fa-arrows-rotate"></i> New Quote</button>
            <button class="cpybtn" id="btn"><i class="fa-solid fa-copy"></i> Copy</button>
    </div>
    <script src="index.js"></script>
</body>
</html>
